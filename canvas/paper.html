<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AXC — Paper Trading</title>
  <link rel="icon" type="image/svg+xml" href="/svg/axc.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/4.6.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
  <style>
    :root {
      --bg:       #0a0a0f;
      --card:     #141420;
      --border:   #2a2a3a;
      --text-1:   #e2e8f0;
      --text-2:   #a1a1b5;
      --text-3:   #636380;
      --accent:   #8b5cf6;
      --pos:      #34d399;
      --neg:      #fb7185;
      --shadow:   0 1px 3px rgba(0,0,0,.3), 0 1px 2px rgba(0,0,0,.2);
      --radius:   8px;
    }
    body, .wrapper {
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 0.875rem;
      color: var(--text-2);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }
    .content-wrapper { background: var(--bg) !important; }
    .main-header.navbar {
      background: #111118 !important;
      border-bottom: 1px solid var(--border);
      box-shadow: none;
      min-height: 46px;
    }
    .main-header .nav-link { color: var(--text-2); }
    .main-header .nav-link:hover { color: var(--text-1); }

    .table { color: var(--text-2); }
    .table-sm td, .table-sm th {
      padding: .5rem .65rem;
      vertical-align: middle;
      border-color: var(--border);
    }
    .table thead th {
      font-size: .75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: var(--text-3);
      border-bottom: 1px solid var(--border);
      background: transparent !important;
    }
    .table-hover tbody tr:hover { background: #1a1a28; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .card-body { background: var(--card); }
    .pt-header {
      background: linear-gradient(135deg, #7c3aed 0%, #4c1d95 100%);
      border-bottom: none;
      border-radius: var(--radius) var(--radius) 0 0;
      padding: .5rem .75rem;
    }
    .pt-header .card-title { color: #fff; font-size: .9rem; }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      box-shadow: var(--shadow);
    }
    .stat-label { font-size: .72rem; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: .04em; }
    .stat-value { font-size: 1.5rem; font-weight: 700; color: var(--text-1); font-variant-numeric: tabular-nums; }

    /* Paper mode indicator */
    .paper-banner {
      background: linear-gradient(90deg, #4c1d95 0%, #7c3aed 50%, #4c1d95 100%);
      color: #c4b5fd;
      text-align: center;
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .15em;
      text-transform: uppercase;
      padding: 3px 0;
    }

    .entry-row { font-size: .8rem; }
    .entry-row td { font-variant-numeric: tabular-nums; }
    .dir-long { color: var(--pos); font-weight: 600; }
    .dir-short { color: var(--neg); font-weight: 600; }

    /* Override AdminLTE light defaults */
    .navbar-light .navbar-nav .nav-link { color: var(--text-2) !important; }
    .navbar-light .navbar-nav .nav-link:hover { color: var(--text-1) !important; }
  </style>
</head>
<body class="hold-transition sidebar-mini sidebar-collapse layout-fixed" style="background:var(--bg)">
<div class="wrapper">

  <!-- Paper mode banner -->
  <div class="paper-banner">PAPER TRADING MODE</div>

  <!-- Navbar -->
  <nav class="main-header navbar navbar-expand" style="background:#111118 !important;border-bottom:1px solid var(--border)">
    <ul class="navbar-nav">
      <li class="nav-item">
        <a class="nav-link" data-widget="pushmenu" href="#" role="button"><i class="fas fa-bars"></i></a>
      </li>
      <li class="nav-item">
        <a href="/paper" class="nav-link" style="font-weight:600;color:var(--text-1) !important">
          <i class="fas fa-flask mr-1" style="color:#a78bfa"></i>Paper Trading
        </a>
      </li>
    </ul>
    <ul class="navbar-nav ml-auto">
      <li class="nav-item">
        <span id="pt-status-badge" class="badge ml-2" style="font-size:.72rem;vertical-align:middle;padding:5px 12px">STOPPED</span>
      </li>
    </ul>
  </nav>

  <!-- Sidebar -->
  <aside class="main-sidebar elevation-4" style="background:#08080d !important">
    <a href="/" class="brand-link" style="border-bottom:1px solid var(--border)">
      <span class="brand-image" style="margin-left:8px"><img src="/svg/axc.svg" style="width:32px;height:32px;vertical-align:middle;filter:brightness(0) invert(1)"></span>
      <span class="brand-text ml-2" style="color:#e2e8f0">AXC</span>
    </a>
    <div class="sidebar">
      <nav class="mt-3">
        <ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview" role="menu">

          <li class="nav-header" style="color:#636380;font-size:.68rem">MONITOR</li>
          <li class="nav-item">
            <a href="/" class="nav-link">
              <i class="nav-icon fas fa-tachometer-alt" style="color:#636380"></i>
              <p style="color:#a1a1b5">主控台</p>
            </a>
          </li>

          <li class="nav-header" style="color:#636380;font-size:.68rem;margin-top:.5rem">TRADING</li>
          <li class="nav-item">
            <a href="/paper" class="nav-link active" style="background:rgba(139,92,246,.15) !important">
              <i class="nav-icon fas fa-flask" style="color:#a78bfa"></i>
              <p style="color:#e2e8f0">Paper Trading</p>
            </a>
          </li>

          <li class="nav-header" style="color:#636380;font-size:.68rem;margin-top:.5rem">ANALYSIS</li>
          <li class="nav-item">
            <a href="/backtest" target="_blank" class="nav-link">
              <i class="nav-icon fas fa-chart-line" style="color:#636380"></i>
              <p style="color:#a1a1b5">回測</p>
            </a>
          </li>

          <li class="nav-header" style="color:#636380;font-size:.68rem;margin-top:.5rem">SYSTEM</li>
          <li class="nav-item">
            <a href="/details" target="_blank" class="nav-link">
              <i class="nav-icon fas fa-book" style="color:#636380"></i>
              <p style="color:#a1a1b5">系統說明</p>
            </a>
          </li>

        </ul>
      </nav>
    </div>
  </aside>

  <!-- Content -->
  <div class="content-wrapper" style="min-height:100vh">
    <div class="content py-3">
      <div class="container-fluid">

        <!-- Stats Row -->
        <div class="row mb-3">
          <div class="col-sm-3">
            <div class="stat-card">
              <div class="stat-label">狀態</div>
              <div id="stat-mode" class="stat-value" style="font-size:1.1rem">—</div>
            </div>
          </div>
          <div class="col-sm-3">
            <div class="stat-card">
              <div class="stat-label">總記錄</div>
              <div id="stat-count" class="stat-value">0</div>
            </div>
          </div>
          <div class="col-sm-3">
            <div class="stat-card">
              <div class="stat-label">PID</div>
              <div id="stat-pid" class="stat-value" style="font-size:1.1rem">—</div>
            </div>
          </div>
          <div class="col-sm-3">
            <div class="stat-card text-center">
              <button id="pt-run-btn" class="btn btn-sm mr-1" style="background:#8b5cf6;color:#fff;border:none;font-size:.8rem;padding:6px 16px" onclick="paperTradingStart()">
                <i class="fas fa-play mr-1"></i>執行一次
              </button>
              <button id="pt-stop-btn" class="btn btn-sm" style="background:#ef4444;color:#fff;border:none;font-size:.8rem;padding:6px 16px;display:none" onclick="paperTradingStop()">
                <i class="fas fa-stop mr-1"></i>停止
              </button>
            </div>
          </div>
        </div>

        <!-- Trade Log Card -->
        <div class="card">
          <div class="pt-header">
            <h3 class="card-title"><i class="fas fa-list-ul mr-2"></i>Dry-Run 記錄</h3>
          </div>
          <div class="card-body p-0" id="pt-body">
            <div class="text-center text-muted py-4" style="font-size:.85rem">載入中…</div>
          </div>
        </div>

      </div>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/4.6.2/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
<script>
// ── Helpers ───────────────────────────────────
function byId(id) { return document.getElementById(id); }
function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ── Paper Trading ─────────────────────────────
var _ptData = null;

function fetchPaperTrading() {
  fetch('/api/paper-trading')
    .then(function(r) { return r.json(); })
    .then(function(d) { _ptData = d; renderPaperTrading(d); })
    .catch(function() {
      renderPaperTrading({mode: 'stopped', pid: null, entries: []});
    });
}

function renderPaperTrading(d) {
  var badge = byId('pt-status-badge');
  var runBtn = byId('pt-run-btn');
  var stopBtn = byId('pt-stop-btn');
  var body = byId('pt-body');
  var statMode = byId('stat-mode');
  var statCount = byId('stat-count');
  var statPid = byId('stat-pid');

  // Status badge
  var colors = {live: '#e11d48', dry_run: '#8b5cf6', stopped: '#94a3b8'};
  var labels = {live: 'LIVE', dry_run: 'DRY RUN', stopped: 'STOPPED'};
  if (badge) {
    badge.textContent = labels[d.mode] || 'STOPPED';
    badge.style.background = colors[d.mode] || colors.stopped;
    badge.style.color = '#fff';
  }

  // Stats
  if (statMode) statMode.textContent = labels[d.mode] || 'STOPPED';
  if (statCount) statCount.textContent = (d.entries || []).length;
  if (statPid) statPid.textContent = d.pid || '—';

  // Buttons
  if (runBtn) runBtn.style.display = (d.mode === 'stopped') ? '' : 'none';
  if (stopBtn) stopBtn.style.display = (d.mode === 'dry_run') ? '' : 'none';

  // Table
  var entries = d.entries || [];
  if (!entries.length) {
    body.innerHTML = '<div class="text-center text-muted py-4" style="font-size:.85rem">暫無 dry-run 記錄</div>';
    return;
  }
  var html = '<div class="table-responsive"><table class="table table-sm table-hover mb-0">' +
    '<thead><tr>' +
    '<th>時間</th><th>動作</th><th>方向</th><th>幣種</th><th>價格</th><th>數量</th><th>SL</th><th>TP</th><th>槓桿</th><th>保證金</th>' +
    '</tr></thead><tbody>';
  for (var i = entries.length - 1; i >= 0; i--) {
    var e = entries[i];
    var dirClass = e.direction === 'LONG' ? 'dir-long' : 'dir-short';
    html += '<tr class="entry-row">' +
      '<td style="white-space:nowrap;color:var(--text-3)">' + esc(e.time) + '</td>' +
      '<td>' + esc(e.action) + '</td>' +
      '<td class="' + dirClass + '">' + esc(e.direction) + '</td>' +
      '<td style="font-weight:500">' + esc(e.pair) + '</td>' +
      '<td>' + esc(e.price) + '</td>' +
      '<td>' + esc(e.qty) + '</td>' +
      '<td style="color:var(--neg)">' + esc(e.sl || '—') + '</td>' +
      '<td style="color:var(--pos)">' + esc(e.tp || '—') + '</td>' +
      '<td>' + esc(e.leverage || '—') + '</td>' +
      '<td>' + esc(e.margin || '—') + '</td>' +
      '</tr>';
  }
  html += '</tbody></table></div>';
  body.innerHTML = html;
}

function paperTradingStart() {
  var btn = byId('pt-run-btn');
  if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-1"></i>啟動中…'; }
  fetch('/api/paper-trading/start', {method: 'POST'})
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.ok) {
        _ptPoll();
      } else {
        alert('啟動失敗: ' + (d.error || ''));
      }
    })
    .catch(function(e) { alert('錯誤: ' + e.message); })
    .finally(function() {
      if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fas fa-play mr-1"></i>執行一次'; }
      fetchPaperTrading();
    });
}

function paperTradingStop() {
  var btn = byId('pt-stop-btn');
  if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-1"></i>停止中…'; }
  fetch('/api/paper-trading/stop', {method: 'POST'})
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (!d.ok) alert('停止失敗: ' + (d.error || ''));
    })
    .catch(function(e) { alert('錯誤: ' + e.message); })
    .finally(function() {
      if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fas fa-stop mr-1"></i>停止'; }
      fetchPaperTrading();
    });
}

var _ptPollTimer = null;
function _ptPoll() {
  if (_ptPollTimer) clearInterval(_ptPollTimer);
  _ptPollTimer = setInterval(function() {
    fetch('/api/paper-trading')
      .then(function(r) { return r.json(); })
      .then(function(d) {
        _ptData = d;
        renderPaperTrading(d);
        if (d.mode === 'stopped') {
          clearInterval(_ptPollTimer);
          _ptPollTimer = null;
        }
      })
      .catch(function() {});
  }, 3000);
}

// ── Init ──────────────────────────────────────
fetchPaperTrading();
// Auto-refresh every 30s when idle
setInterval(function() {
  if (!_ptPollTimer) fetchPaperTrading();
}, 30000);
</script>
</body>
</html>
