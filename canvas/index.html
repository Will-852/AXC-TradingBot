<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OpenClaw ICU</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-0:#080b10;--bg-1:#0f1318;--bg-2:#161c24;--bg-3:#1e2530;
  --border-s:rgba(255,255,255,0.04);--border-d:rgba(255,255,255,0.08);--border-x:rgba(255,255,255,0.14);
  --tp:#f0f4f8;--ts:#8b95a1;--tm:#4a5568;
  --pos:#34d399;--neg:#f87171;--warn:#fbbf24;--info:#60a5fa;--purp:#a78bfa;
}
html,body{height:100%;background:var(--bg-0);color:var(--tp);font-family:'Inter',system-ui,sans-serif;font-size:15px;line-height:1.5;overflow:hidden}
.mono{font-family:'JetBrains Mono',monospace}

#sidebar{position:fixed;left:0;top:0;bottom:0;width:56px;background:var(--bg-0);border-right:1px solid var(--border-s);z-index:100;display:flex;flex-direction:column;align-items:center;padding:12px 0}
.si{position:relative;width:40px;height:40px;display:flex;align-items:center;justify-content:center;margin:4px 0;cursor:pointer;border-left:2px solid transparent;opacity:0.35;transition:opacity .15s}
.si:hover{opacity:0.7}.si.on{opacity:1;border-left-color:var(--pos)}.si.won{opacity:1;border-left-color:var(--warn)}
.si-sp{position:absolute;top:8px;left:8px}
.si-dot{position:absolute;bottom:2px;right:2px;width:6px;height:6px;border-radius:50%;background:var(--tm)}
.si-dot.dl{background:var(--pos);animation:sp 3s ease infinite}.si-dot.dok{background:var(--pos);opacity:.6}
.si-dot.dw{background:var(--warn);animation:sb .5s step-end infinite}
@keyframes sp{0%,100%{opacity:1}50%{opacity:.4}}@keyframes sb{50%{opacity:0}}
.si-sep{width:24px;height:1px;background:var(--border-s);margin:8px 0}
.si[data-tip]:hover::after{content:attr(data-tip);position:absolute;left:48px;top:50%;transform:translateY(-50%);background:var(--bg-2);color:var(--tp);font-size:11px;padding:4px 10px;border-radius:4px;border:1px solid var(--border-d);white-space:nowrap;z-index:200;pointer-events:none}

#header{height:52px;background:var(--bg-0);border-bottom:1px solid var(--border-s);display:flex;align-items:center;padding:0 20px;gap:16px}
.hb{font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:.15em;flex-shrink:0}
.hb-g{color:var(--pos)}.hb-m{color:var(--tm)}
#ecg{width:160px;height:32px;flex-shrink:0;opacity:.9}
.hr{display:flex;gap:8px;margin-left:auto;align-items:center;flex-shrink:0}
.pill{font-family:'JetBrains Mono',monospace;font-size:11px;padding:4px 10px;border-radius:6px;background:var(--bg-2);border:1px solid var(--border-s);color:var(--tm);white-space:nowrap}
.pill-on{color:var(--pos);border-color:rgba(52,211,153,.3)}
.hsep{width:1px;height:20px;background:var(--border-s)}
.hts{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--tm)}
.ldot{width:6px;height:6px;border-radius:50%;background:var(--pos);animation:lp 2s ease infinite;flex-shrink:0}
@keyframes lp{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.4)}}

#main{margin-left:56px;height:100vh;display:flex;flex-direction:column}
#content{flex:1;display:flex;flex-direction:column;padding:16px 20px;gap:16px;overflow:hidden}

.hero{display:grid;grid-template-columns:35fr 65fr;gap:16px;height:280px;flex-shrink:0}
.cd{background:var(--bg-1);border:1px solid var(--border-d);border-radius:12px;overflow:hidden;display:flex;flex-direction:column}

.bl{font-size:11px;text-transform:uppercase;color:var(--tm);letter-spacing:.1em;font-weight:500}
.bv{font-family:'JetBrains Mono',monospace;font-size:56px;font-weight:700;line-height:1.1;margin:12px 0 16px}
.bsub{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.bs{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:600;margin-top:2px}
.bdiv{height:1px;background:var(--border-s);margin:16px 0}
.bpills{display:flex;gap:8px;flex-wrap:wrap}

.mhd{padding:16px 32px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border-s);flex-shrink:0}
.ml{font-size:13px;color:var(--ts);font-weight:500}
.mtabs{display:flex}.mt{font-size:11px;color:var(--tm);padding:4px 12px;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.mt:hover{color:var(--ts)}.mt.active{color:var(--tp);border-bottom-color:var(--info)}
.mb{flex:1;padding:0 32px;overflow-y:auto}
.mr{display:flex;align-items:center;height:56px;border-bottom:1px solid var(--border-s);transition:background .1s}
.mr:last-child{border-bottom:none}.mr:hover{background:var(--bg-3)}
.ms{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:500;color:var(--ts);width:44px;flex-shrink:0}
.mp{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:600;width:180px;text-align:right;flex-shrink:0}
.mk{flex:1;padding:0 24px;height:28px}.mk svg{width:100%;height:28px}
.mc{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:600;width:100px;text-align:right;flex-shrink:0}
.ma{font-size:14px;width:24px;text-align:center;flex-shrink:0}
.c-pos{color:var(--pos)}.c-neg{color:var(--neg)}.c-flat{color:var(--tm)}
.pfl{animation:pf .8s ease}@keyframes pf{0%{background:rgba(52,211,153,.15)}100%{background:transparent}}
.pfn{animation:pfn .8s ease}@keyframes pfn{0%{background:rgba(248,113,113,.15)}100%{background:transparent}}

.drow{display:grid;grid-template-columns:32fr 28fr 40fr;gap:16px;flex:1;min-height:0}
.dc{display:flex;flex-direction:column;min-height:0}.dc .cd{flex:1;min-height:0}
.sl{font-size:11px;text-transform:uppercase;color:var(--tm);letter-spacing:.1em;font-weight:500;margin-bottom:8px}

.lr{display:flex;align-items:center;height:54px;padding:0 16px;cursor:pointer;transition:background .15s}
.lr:hover{background:var(--bg-3)}
.ld{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.li{flex:1;margin-left:14px;min-width:0}
.ln{font-size:14px;font-weight:500}.lp{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--tm);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lf{font-size:10px;font-weight:500;letter-spacing:.05em;padding:3px 10px;border-radius:20px;flex-shrink:0}
.lch{font-size:18px;color:var(--tm);margin-left:8px;flex-shrink:0;transition:transform .2s}
.lr.open .lch{transform:rotate(90deg)}
.lsep{height:1px;background:var(--border-s);margin-left:36px}
.lex{max-height:0;overflow:hidden;transition:max-height .2s ease}
.lex.open{max-height:60px}
.lex-in{padding:4px 16px 12px 36px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--info)}

.ar{display:flex;align-items:center;height:52px;padding:0 16px;gap:12px}
.ac{width:28px;height:32px;flex-shrink:0;position:relative}
.chr-sprite{position:absolute;top:0;left:0;width:1px;height:1px;background:transparent;transform:scale(2);transform-origin:top left;image-rendering:pixelated}
.an{font-size:13px;font-weight:500;width:64px;flex-shrink:0}
.ab{flex:1;height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.af{height:100%;border-radius:2px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.as{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--tm);width:48px;text-align:right;flex-shrink:0}
.aft{padding:12px 16px;border-top:1px solid var(--border-s);font-size:11px;color:var(--tm);margin-top:auto}

.lgb{flex:1;overflow-y:auto;padding:4px 0}.lgb::-webkit-scrollbar{width:0}
.ll{display:flex;align-items:center;height:36px;padding:0 16px;gap:8px;font-family:'JetBrains Mono',monospace;font-size:12px;transition:background .15s}
.ll:hover{background:var(--bg-3)}
.lt{color:var(--tm);font-size:11px;flex-shrink:0;width:40px}
.lm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--tm)}
.ll-trg .lm{color:var(--tp)}
.lb{font-size:9px;font-weight:600;padding:2px 8px;border-radius:4px;flex-shrink:0;letter-spacing:.03em}
.lb-t{background:rgba(251,191,36,.15);color:var(--warn);border:1px solid rgba(251,191,36,.3)}
.lb-d{background:var(--bg-3);color:var(--tm);border:1px solid var(--border-s)}
.lb-e{background:rgba(248,113,113,.2);color:#fff;border:1px solid rgba(248,113,113,.3)}

#footer{height:36px;background:var(--bg-0);border-top:1px solid var(--border-s);display:flex;align-items:center;padding:0 20px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--tm);gap:6px;flex-shrink:0}
.fh{color:var(--info)}.fc{margin:0 auto}.fr{display:flex;align-items:center;gap:6px;margin-left:auto}
.ftd{width:6px;height:6px;border-radius:50%;display:inline-block}
.organ-sprite{width:1px;height:1px;background:transparent;transform:scale(3);transform-origin:top left;image-rendering:pixelated}
</style>
</head>
<body>
<nav id="sidebar">
  <div class="si on" data-agent="main" data-tip="大腦"><span class="si-sp"><span class="organ-sprite organ-brain"></span></span><span class="si-dot"></span></div>
  <div class="si" data-agent="scanner" data-tip="眼"><span class="si-sp"><span class="organ-sprite organ-eye"></span></span><span class="si-dot"></span></div>
  <div class="si" data-agent="trader" data-tip="心臟"><span class="si-sp"><span class="organ-sprite organ-heart"></span></span><span class="si-dot"></span></div>
  <div class="si" data-agent="heartbeat" data-tip="神經"><span class="si-sp"><span class="organ-sprite organ-nerve"></span></span><span class="si-dot"></span></div>
  <div class="si-sep"></div>
  <div style="flex:1"></div>
  <div class="si" data-tip="設定"><span style="font-size:18px">⚙</span></div>
</nav>
<div id="main">
  <header id="header">
    <span class="hb"><span class="hb-g">OPENCLAW</span><span class="hb-m"> 深切治療</span></span>
    <canvas id="ecg" width="160" height="32"></canvas>
    <div class="hr">
      <span class="pill" id="p-trg">觸發: 關</span>
      <span class="pill" id="p-sig">訊號: 無</span>
      <span class="pill pill-on" id="p-mode">—</span>
      <span class="hsep"></span>
      <span class="hts" id="hd-ts">—</span>
      <span class="ldot"></span>
    </div>
  </header>
  <div id="content">
    <section class="hero">
      <div class="cd" style="padding:28px 32px">
        <div class="bl">資產總值</div>
        <div class="bv" id="bal-num">$0.00</div>
        <div class="bsub">
          <div><div class="bl">今日盈虧</div><div class="bs" id="bal-pnl" style="color:var(--ts)">$0.00</div></div>
          <div><div class="bl">持倉</div><div class="bs" id="bal-pos" style="color:var(--ts)">無</div></div>
        </div>
        <div class="bdiv"></div>
        <div class="bpills">
          <span class="pill pill-on" id="bp-mode">RANGE</span>
          <span class="pill" id="bp-trg">觸發: 關</span>
          <span class="pill" id="bp-sig">訊號: 無</span>
        </div>
      </div>
      <div class="cd">
        <div class="mhd"><span class="ml">市場走勢</span><div class="mtabs"><span class="mt">1時</span><span class="mt">4時</span><span class="mt active">24時</span><span class="mt">1週</span></div></div>
        <div class="mb" id="mkt-body"></div>
      </div>
    </section>
    <section class="drow">
      <div class="dc"><div class="sl">系統層級</div><div class="cd" id="lay-card"></div></div>
      <div class="dc"><div class="sl">代理活動</div><div class="cd"><div id="act-body"></div><div class="aft" id="act-foot">—</div></div></div>
      <div class="dc"><div class="sl" style="display:flex;justify-content:space-between;align-items:center"><span>掃描記錄</span><button class="lb-d" id="btn-pause" style="cursor:pointer;background:transparent;font-family:'JetBrains Mono',monospace;font-size:11px;padding:2px 8px;border-radius:4px">暫停</button></div><div class="cd"><div class="lgb" id="log-body"></div></div></div>
    </section>
  </div>
  <footer id="footer">
    <span id="ft-git">⎇ —</span>
    <span class="fc" id="ft-up">—</span>
    <span class="fr" id="ft-tg">📱 —</span>
  </footer>
</div>
<script>
let D=null,pH={},paused=false,prevP={},balInit=false;
const ecg=document.getElementById('ecg').getContext('2d');
const EW=160,EH=32,EM=16;let eX=0;
ecg.fillStyle='#080b10';ecg.fillRect(0,0,EW,EH);
function ecgStep(){ecg.fillStyle='rgba(8,11,16,.15)';ecg.fillRect(eX,0,5,EH);const ph=eX%90;let y=EM;if(ph>35&&ph<39)y=EM-3;else if(ph>42&&ph<45)y=EM+5;else if(ph>45&&ph<50)y=EM-14;else if(ph>50&&ph<53)y=EM+6;else if(ph>58&&ph<66)y=EM-3;ecg.strokeStyle='rgba(52,211,153,0.4)';ecg.lineWidth=1;ecg.shadowColor='#34d399';ecg.shadowBlur=3;ecg.beginPath();ecg.moveTo(eX,EM);ecg.lineTo(eX+2,y);ecg.stroke();ecg.shadowBlur=0;eX=(eX+2)%EW}
setInterval(ecgStep,45);
function fP(p){const n=parseFloat(p);if(isNaN(n))return p;return n>=1000?'$'+n.toLocaleString('en',{maximumFractionDigits:0}):n>=10?'$'+n.toFixed(2):'$'+n.toFixed(4)}
function spark(pts,clr){if(!pts||pts.length<2)return'';const mn=Math.min(...pts),mx=Math.max(...pts),rng=mx-mn||1,W=160,H=28,p=3;let d='M';pts.forEach((v,i)=>{const x=p+i/(pts.length-1)*(W-p*2);const y=H-p-(v-mn)/rng*(H-p*2);d+=(i?'L':'')+x.toFixed(1)+','+y.toFixed(1)});return'<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none"><path d="'+d+'" fill="none" stroke="'+clr+'" stroke-width="1.5"/></svg>'}
function countUp(el,t){const t0=performance.now();(function f(now){const p=Math.min((now-t0)/600,1),e=1-Math.pow(1-p,3);el.textContent='$'+(t*e).toFixed(2);if(p<1)requestAnimationFrame(f)})(t0)}
const ORG={
brain:{d:'..PPPP..\n.PVPVPP.\nPPVPPVPP\nPPPPPPVP\nPVPPPPPP\nPPPVPPPP\n.PPPPPP.\n..PPPP..',c:{P:'#ff6b9d',V:'#c44dff'}},
eye:{d:'..WWWW..\n.WWWWWW.\nWWBBBBWW\nWBBDDBBW\nWBBDDBBW\nWWBBBBWW\n.WWWWWW.\n..WWWW..',c:{W:'#e6edf3',B:'#58a6ff',D:'#1f6feb'}},
heart:{d:'.RR..RR.\nRLLRRLLR\nRLLLLLLR\nRLLLLLLR\n.RLLLLR.\n..RLLR..\n...RR...\n........',c:{R:'#f85149',L:'#ff7b72'}},
nerve:{d:'....AA..\n...AB...\n..ABB...\n..ABBA..\n..ABBA..\n...BBA..\n...BA...\n..AA....',c:{A:'#d29922',B:'#f0c000'}}};
const CHR={
brain:{d:'...BBBBBBBB.....\n..BBBBBBBBBB....\n.BBSSSSSSSSBB...\n.BBSSSSSSSSBB...\n.BBSDSSSSDSBB...\n.BBSWSSSSWSBB...\n.BBSDSSSSDSBB...\n.BBSSS.SSSSBB...\n.BBSSSSSSSSBB...\n..BBSSSSSSBB....\n...BBBBBBBB.....\n....WWWWWW......\n...WWBWWBWW.....\n...WWBWWBWW.....\n...WW....WW.....\n...W......W.....',c:{B:'#58a6ff',S:'#f0883e',D:'#161b22',W:'#e6edf3'}},
eyes:{d:'...GGGGGGG......\n..GGGGGGGGG.....\n.GGMMMMMMMGG....\n.GMMWWWWWMMG....\n.GMWWBBBWWMG....\n.GMWBBGBBWMG....\n.GMWWBBBWWMG....\n.GMMWWWWWMMG....\n.GGMMMMMMMGG....\n..GGMMMMMGG.....\n...MM...MM......\n..GMMMMMMMG.....\n.GGMBMMMBMGG....\n.GMMMMMMMMMG....\n..GG....GG......\n..G......G......',c:{G:'#3fb950',M:'#30363d',B:'#58a6ff',W:'#e6edf3'}},
heart:{d:'...DDDDDDDD.....\n..DDDDDDDDDD....\n.DDSSSSSSSSDD...\n.DDSSSSSSSSDD...\n.DDSDSSSSDSDD...\n.DDSSSSSSSSDD...\n.DDSS.SS.SSDD...\n..DDSSSSSSDD....\n...WWWWWWWW.....\n..WWRWWWWRWW....\n..WWRWWWWRWW....\n..WWRWWWWRWW....\n.WWWGGGGGWWWW...\n.WWGG.G.GGWW....\n..WW.....WW.....\n..D.......D.....',c:{D:'#161b22',S:'#f0883e',W:'#e6edf3',R:'#f85149',G:'#3fb950'}},
nerves:{d:'...WWWWWWW......\n..WWRRRRRWW.....\n.WWWWRWRWWWW....\n.WWSSSSSSSWW....\n.WWSDSSSSDWW....\n.WWSSSSSSSWW....\n.WWSS.S.SSWW....\n..WWSSSSSWW.....\n...WWWWWWW......\n..WWWAWWAWWW....\n..WAAAWWAAAW....\n..WWWAWWAWWW....\n..WWWWWWWWWW....\n...WW....WW.....\n...W......W.....\n...D......D.....',c:{W:'#e6edf3',R:'#f85149',S:'#f0883e',D:'#161b22',A:'#d29922'}}};
function genShadow(sp){const rows=sp.d.split('\n'),sh=[];rows.forEach((r,y)=>{for(let x=0;x<r.length;x++){const ch=r[x];if(ch!=='.'&&sp.c[ch])sh.push(x+'px '+y+'px 0 '+sp.c[ch])}});return sh.join(',')}
(function(){const s=document.createElement('style');s.textContent=Object.entries(ORG).map(([n,v])=>'.organ-'+n+'{box-shadow:'+genShadow(v)+'}').join('\n')+'\n'+Object.entries(CHR).map(([n,v])=>'.chr-'+n+'{box-shadow:'+genShadow(v)+'}').join('\n');document.head.appendChild(s)})();
const ACLR={main:'var(--info)',trader:'var(--pos)',scanner:'var(--warn)',heartbeat:'var(--purp)'};
const ANAME={main:'主腦',trader:'交易員',scanner:'掃描器',heartbeat:'心跳'};
const ACHR={main:'brain',trader:'heart',scanner:'eyes',heartbeat:'nerves'};
const LAYERS=[{name:'骨架',code:'SOUL',p:'agents/*/SOUL.md',freq:'從不',clr:'#a78bfa'},{name:'記憶',code:'MEMORY',p:'workspace/MEMORY.md',freq:'每日',clr:'#60a5fa'},{name:'基因',code:'DNA',p:'config/params.py',freq:'每週',clr:'#34d399'},{name:'肌肉',code:'MUSCLES',p:'scripts/',freq:'穩定',clr:'#fbbf24'},{name:'血液',code:'BLOOD',p:'shared/',freq:'實時',clr:'#f87171'},{name:'鏡子',code:'MIRROR',p:'CLAUDE.md',freq:'參考',clr:'#8b95a1'}];
function hexRgba(h,a){return'rgba('+parseInt(h.slice(1,3),16)+','+parseInt(h.slice(3,5),16)+','+parseInt(h.slice(5,7),16)+','+a+')'}
document.getElementById('lay-card').innerHTML=LAYERS.map((l,i)=>'<div class="lr" onclick="this.classList.toggle(\'open\');document.getElementById(\'lx'+i+'\').classList.toggle(\'open\')"><span class="ld" style="background:'+l.clr+'"></span><div class="li"><div class="ln">'+l.name+' <span style="color:var(--tm);font-weight:400">'+l.code+'</span></div><div class="lp">'+l.p+'</div></div><span class="lf" style="background:'+hexRgba(l.clr,.12)+';color:'+l.clr+'">'+l.freq+'</span><span class="lch">›</span></div>'+(i<LAYERS.length-1?'<div class="lsep"></div>':'')+'<div class="lex" id="lx'+i+'"><div class="lex-in">~/.openclaw/'+l.p+'</div></div>').join('');
function render(){if(!D)return;
  var t=D.trigger||'OFF',s=D.signal_active||'NO',e;
  e=document.getElementById('p-trg');e.textContent='觸發: '+(t==='ON'?'開':'關');e.className='pill'+(t==='ON'?' pill-on':'');
  e=document.getElementById('p-sig');e.textContent='訊號: '+(s==='YES'?'有':'無');e.className='pill'+(s==='YES'?' pill-on':'');
  document.getElementById('p-mode').textContent=D.mode||'?';
  document.getElementById('hd-ts').textContent=D.timestamp||'';
  var bal=parseFloat(D.balance)||0;
  if(!balInit){countUp(document.getElementById('bal-num'),bal);balInit=true}else{document.getElementById('bal-num').textContent='$'+bal.toFixed(2)}
  var pos=D.position,dir=D.direction,ep=document.getElementById('bal-pos');
  if(pos&&pos!=='NONE'&&pos!=='—'&&pos!=='---'){ep.textContent=pos+(dir&&dir!=='—'&&dir!=='---'?' '+dir:'');ep.style.color='var(--warn)'}else{ep.textContent='無';ep.style.color='var(--ts)'}
  document.getElementById('bp-mode').textContent=D.mode||'?';
  document.getElementById('bp-trg').textContent='觸發: '+(t==='ON'?'開':'關');
  document.getElementById('bp-sig').textContent='訊號: '+(s==='YES'?'有':'無');
  var syms=['BTC','ETH','XRP','XAG'],prices=D.prices||{},hist=D.price_history||{};
  syms.forEach(function(s){if(hist[s])pH[s]=hist[s]});

  syms.forEach(function(s){prevP[s]=parseFloat(prices[s])||0});

  document.getElementById('act-foot').textContent='今日 '+(aa.total_calls||0)+' 次  ·  費用由 OpenClaw 追蹤';
  if(!paused){var lines=(D.scan_log||[]).slice(-20).reverse();document.getElementById('log-body').innerHTML=lines.map(function(l){var cls='',badge='';if(l.indexOf('TRIGGER')>=0){cls=' ll-trg';badge='<span class="lb lb-t">觸發</span>'}else if(l.indexOf('ERROR')>=0){badge='<span class="lb lb-e">錯誤</span>'}else if(l.indexOf('DEEP')>=0){badge='<span class="lb lb-d">深度</span>'}var tm=(l.match(/\d{2}:\d{2}/)||[''])[0];var rest=l.replace(/^\[.*?\]\s*/,'');return'<div class="ll'+cls+'">'+badge+'<span class="lt">'+tm+'</span><span class="lm">'+rest+'</span></div>'}).join('')}
  var ags=D.agents||[];['main','scanner','trader','heartbeat'].forEach(function(k){var el=document.querySelector('.si[data-agent="'+k+'"]');if(!el)return;var a=null;for(var i=0;i<ags.length;i++){if(ags[i].id===k){a=ags[i];break}}var st=(a&&a.status)||'off';el.className='si'+(st==='live'||st==='ok'?' on':st==='warn'?' won':'');var dot=el.querySelector('.si-dot');if(dot)dot.className='si-dot'+(st==='live'?' dl':st==='ok'?' dok':st==='warn'?' dw':'')});
  var gi=D.git||{};if(gi.hash&&gi.hash!=='—'){document.getElementById('ft-git').innerHTML='⎇ <span class="fh">'+gi.hash+'</span> · '+gi.message+' · '+gi.time_ago}
  var up=D.uptime||{};document.getElementById('ft-up').textContent=up.duration&&up.duration!=='—'?'運行 '+up.duration:'—';
  var tg=D.telegram||{};var tc=tg.connected?'var(--pos)':'var(--neg)';var tl=tg.connected?'已連接':'離線';document.getElementById('ft-tg').innerHTML='📱 電報 <span class="ftd" style="background:'+tc+'"></span> <span style="color:'+tc+'">'+tl+'</span>'}
document.getElementById('btn-pause').addEventListener('click',function(){paused=!paused;this.textContent=paused?'繼續':'暫停'});
